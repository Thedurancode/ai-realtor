services:
  claude:
    build:
      context: .
      dockerfile: Dockerfile.claude-setup
    container_name: claude_code_env
    stdin_open: true
    tty: true
    environment:
      # Required - add your keys
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}

      # MCP / RealtorClaw
      MCP_API_BASE_URL: ${MCP_API_BASE_URL:-http://host.docker.internal:8000}
      MCP_API_KEY: ${MCP_API_KEY:-}

      # ElevenLabs
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
    volumes:
      # Persist Claude memory + settings across container restarts
      - claude_home:/root/.claude
      # Mount your local .env for secrets
      - ./.env.docker:/root/Documents/GitHub/ai-realtor/.env:ro
    ports:
      - "8002:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  claude_home:
