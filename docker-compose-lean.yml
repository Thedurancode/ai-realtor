# Lean deployment — just Postgres + API + MCP
# No Remotion, no Redis, no Spacebot, no Chromium
# Total footprint: ~300MB (vs ~2GB+ full stack)

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: realtorclaw-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_realtor}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.lean
    container_name: realtorclaw-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ai_realtor}

      # MCP internal connection
      MCP_API_BASE_URL: http://localhost:8000
      MCP_API_KEY: ${REALTORCLAW_API_KEY:-}

      # Performance
      API_WORKERS: ${API_WORKERS:-2}
      APP_ENV: ${APP_ENV:-development}
    ports:
      - "${API_PORT:-8000}:8000"
      - "${MCP_PORT:-8001}:8001"
    volumes:
      - ./log:/app/log
      - ./uploads:/app/uploads

volumes:
  pgdata:
